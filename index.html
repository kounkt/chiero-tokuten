<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>読者限定特典 — チエロ</title>
<style>
  :root{ --sumi:#1F1A16; --muted:#96897A; --kinari:#FBF7F1; --paper:#fff; --aka:#E60012; --rule:#E7DFD1; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--kinari);color:var(--sumi);
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
  .card{background:var(--paper);border:1px solid var(--rule);border-radius:10px;
    padding:44px 34px;max-width:420px;width:100%;text-align:center;}
  .hat{width:64px;margin:0 auto 22px;display:block;}
  .tag{font-size:11px;letter-spacing:.5em;color:var(--aka);font-weight:600;margin-left:.5em;}
  h1{font-family:"Hiragino Mincho ProN",serif;font-size:25px;font-weight:600;
    letter-spacing:.08em;margin:14px 0 18px;}
  p{font-size:14px;line-height:2;color:#4A423A;margin-bottom:26px;}
  a.dl{display:block;background:var(--aka);color:#fff;text-decoration:none;
    padding:15px;border-radius:6px;font-size:15px;font-weight:600;letter-spacing:.08em;}
  .note{font-size:11.5px;color:var(--muted);margin:22px 0 0;line-height:1.9;}
</style>
</head>
<body>
  <div class="card">
    <svg class="hat" viewBox="0 0 44 28" xmlns="http://www.w3.org/2000/svg">
      <path d="M10.2 19.2C10.2 10.6 15.4 4.4 22 4.4s11.8 6.2 11.8 14.8z" fill="#E60012"/>
      <ellipse cx="22" cy="19.6" rx="19" ry="4.1" fill="#E60012"/>
    </svg>
    <div class="tag">読者限定特典</div>
    <h1>自分商品設計シート</h1>
    <p>強みは、探すものではありません。<br>すでに手元にある材料を、並べ直すものです。</p>
    <a class="dl" href="/tsuyomi.pdf">シートを開く（A4・24ページ）</a>
    <p class="note">書き込み式のPDFです。<br>印刷しても、画面のままでも使えます。</p>
  </div>
</body>
</html>
